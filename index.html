<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Invite</title><link href="https://fonts.cdnfonts.com/css/minecraft" rel="stylesheet"><style>
html, body {
  margin: 0;
  padding: 0;
  font-family: 'Minecraft', sans-serif;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  transition: background 3s ease;
}

/* Background phases */
body.day { background: linear-gradient(135deg, #87CEEB, #87CEFA); }
body.sunset { background: linear-gradient(135deg, #FFA500, #FF4500); }
body.night { background: linear-gradient(135deg, #000033, #000011); }
body.sunrise { background: linear-gradient(135deg, #FFB347, #87CEEB); }

.container {
  width: 90%;
  max-width: 400px;
  text-align: center;
  z-index: 10;
}

h1 {
  font-size: 6vw;
  margin-bottom: 20px;
  color: white;
  text-shadow:
    0 0 8px #fff,
    0 0 16px #ff9ecb,
    0 0 24px #ff4da6;
  animation: textGlow 3s ease-in-out infinite alternate;
}

#countdown {
  font-size: 4.5vw;
  margin-bottom: 30px;
  color: #fff;
  text-shadow:
    0 0 6px #ffffff,
    0 0 14px #87cefa,
    0 0 22px #00bfff;
}

/* Buttons */
.button-row {
  display: flex;
  justify-content: center;
  gap: 20px;
}

.btn {
  width: 120px;
  padding: 12px 0;
  font-size: 18px;
  border: none;
  border-radius: 50px;
  font-weight: bold;
  cursor: pointer;
}

.yes { background: #4caf50; color: white; }
.no  { background: #f44336; color: white; transition: transform 0.2s ease; }

/* Sun and Moon */
.sun, .moon {
  position: absolute;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  top: 20px;
  right: 20px;
  animation: celestialGlow 3s ease-in-out infinite alternate;
}

.sun {
  background: #FFD700;
  box-shadow:
    0 0 20px #ffd700,
    0 0 40px #ffae00,
    0 0 60px #ff8c00;
}

.moon {
  background: #FDF6BA;
  display: none;
  box-shadow:
    0 0 18px #fffacd,
    0 0 36px #f0e68c,
    0 0 54px #fff;
}

@keyframes celestialGlow {
  from { transform: scale(1); filter: brightness(1); }
  to { transform: scale(1.08); filter: brightness(1.25); }
}

/* Stars */
.star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  opacity: 0;
}

/* Sparkles */
.sparkle {
  position: absolute;
  width: 4vw;
  height: 4vw;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: sparkleAnim 2s linear infinite;
  pointer-events: none;
  z-index: 5;
}

@keyframes sparkleAnim {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* FINAL YES SCREEN */
.final-screen {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  background: linear-gradient(to bottom, #001d3d, #000814);
  display: flex;
  justify-content: center;
  align-items: center;
}

.final-message {
  font-family: 'Minecraft', sans-serif;
  font-size: 48px;
  color: #fff;
  -webkit-text-stroke: 2px black;
  text-shadow:
    0 0 10px #fff,
    0 0 20px #ffd700,
    0 0 40px #ffae00;
  z-index: 2;
}

.sparkles-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(2px 2px at 70% 60%, white, transparent),
    radial-gradient(2px 2px at 40% 80%, white, transparent),
    radial-gradient(2px 2px at 90% 20%, white, transparent);
  animation: sparkleMove 6s linear infinite;
  opacity: 0.7;
}

@keyframes sparkleMove {
  from { transform: translateY(0); }
  to { transform: translateY(-60px); }
}

.heart {
  position: absolute;
  font-size: 20px;
  animation: floatUp 2s ease-out forwards;
  pointer-events: none;
}

@keyframes floatUp {
  0% { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
  100% { transform: translate(-50%, -150px) scale(1.4); opacity: 0; }
}
</style></head><body class="day"><div class="sun"></div>
<div class="moon"></div><div class="container">
  <h1>Would you like to go to the movies with me on February 14th?</h1>
  <div id="countdown"></div>  <div class="button-row">
    <button class="btn yes" id="yesBtn">Yes</button>
    <button class="btn no" id="noBtn">No</button>
  </div>
</div><script>
const bodyEl = document.body;
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const sun = document.querySelector(".sun");
const moon = document.querySelector(".moon");
const countdownEl = document.getElementById("countdown");

let clickPhaseCount = 0;
let currentPhase = "day";

/* Countdown */
const targetDate = new Date("Feb 14, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const d = targetDate - now;

  if (d < 0) {
    countdownEl.innerText = "It's today ❤️";
    return;
  }

  const days = Math.floor(d / (1000*60*60*24));
  const hours = Math.floor((d % (1000*60*60*24)) / (1000*60*60));
  const minutes = Math.floor((d % (1000*60*60)) / (1000*60));
  const seconds = Math.floor((d % (1000*60)) / 1000);

  countdownEl.innerText = `${days}d ${hours}h ${minutes}m ${seconds}s left`;
}, 1000);

/* Stars */
const stars = [];
for (let i = 0; i < 30; i++) {
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random()*100 + "vw";
  s.style.top = Math.random()*100 + "vh";
  document.body.appendChild(s);
  stars.push(s);
}

/* Sparkles */
function createSparkle() {
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random()*90 + "vw";
  s.style.top = Math.random()*90 + "vh";
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 2000);
}
setInterval(createSparkle, 200);

/* Safe No-button movement */
let offsetX = 0;
let offsetY = 0;

noBtn.addEventListener("click", e => {
  e.preventDefault();

  offsetX += (Math.random() - 0.5) * 200;
  offsetY += (Math.random() - 0.5) * 150;

  const rect = noBtn.getBoundingClientRect();

  const maxLeft = -rect.left + 10;
  const maxRight = window.innerWidth - rect.right - 10;
  const maxTop = -rect.top + 10;
  const maxBottom = window.innerHeight - rect.bottom - 10;

  offsetX = Math.min(Math.max(offsetX, maxLeft), maxRight);
  offsetY = Math.min(Math.max(offsetY, maxTop), maxBottom);

  noBtn.style.transform = `translate(${offsetX}px, ${offsetY}px)`;

  clickPhaseCount++;
  checkPhaseAdvance();
});

noBtn.addEventListener("mouseover", () => noBtn.click());

/* YES BUTTON FINAL EFFECT */
yesBtn.addEventListener("click", () => {
  document.body.innerHTML = `
    <div class="final-screen">
      <div class="sparkles-bg"></div>
      <div class="hearts"></div>
      <div class="final-message">ব্লাহহ, একলা যা 😛</div>
    </div>
  `;

  createHearts();
});

function createHearts() {
  const container = document.querySelector(".hearts");

  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = "💖";

    heart.style.left = Math.random() * 100 + "%";
    heart.style.top = "60%";

    container.appendChild(heart);

    setTimeout(() => heart.remove(), 2000);
  }, 300);
}

/* Day/Night phases */
function checkPhaseAdvance() {
  if (currentPhase === "day" && clickPhaseCount >= 4) {
    currentPhase = "sunset";
    clickPhaseCount = 0;
    bodyEl.className = "sunset";

  } else if (currentPhase === "sunset" && clickPhaseCount >= 1) {
    currentPhase = "night";
    clickPhaseCount = 0;
    bodyEl.className = "night";
    sun.style.display = "none";
    moon.style.display = "block";
    stars.forEach(s => s.style.opacity = 1);

  } else if (currentPhase === "night" && clickPhaseCount >= 4) {
    currentPhase = "sunrise";
    clickPhaseCount = 0;
    bodyEl.className = "sunrise";

  } else if (currentPhase === "sunrise" && clickPhaseCount >= 1) {
    currentPhase = "day";
    clickPhaseCount = 0;
    bodyEl.className = "day";
    sun.style.display = "block";
    moon.style.display = "none";
    stars.forEach(s => s.style.opacity = 0);
  }
}
</script></body>
</html>
