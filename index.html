<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Invite</title>

  <!-- Minecraft Font -->
  <link href="https://fonts.cdnfonts.com/css/minecraft" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9ecb, #ff4d8d, #ff6fa5);
      background-size: 300% 300%;
      animation: gradientMove 8s ease infinite;
      font-family: 'Minecraft', sans-serif;
      color: white;
      overflow: hidden;
      text-align: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 90%;
      max-width: 400px;
    }

    h1 {
      font-size: 6vw; /* scales with screen width */
      margin-bottom: 20px;
      text-shadow: 0 0 8px #fff, 0 0 18px #ffd1e6;
      animation: glowText 2s ease-in-out infinite alternate;
    }

    @keyframes glowText {
      from { text-shadow: 0 0 8px #fff, 0 0 18px #ffd1e6; }
      to { text-shadow: 0 0 16px #fff, 0 0 32px #ff9ecb; }
    }

    #countdown {
      font-size: 4.5vw;
      margin-bottom: 30px;
      text-shadow: 0 0 8px #fff;
    }

    .btn {
      width: 40%;
      max-width: 120px;
      padding: 10px 0;
      font-size: 4vw;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      margin: 0 5%;
      display: inline-block;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      font-family: 'Minecraft', sans-serif;
    }

    .btn:active { transform: scale(0.95); }

    .yes {
      background: #ff4d8d;
      color: white;
      box-shadow: 0 0 12px rgba(255,255,255,0.8);
    }

    .no {
      background: #ff1744;
      color: white;
      box-shadow: 0 0 12px rgba(0,0,0,0.4);
      position: relative;
    }

    .heart, .sparkle {
      position: absolute;
      pointer-events: none;
    }

    .heart {
      top: -20px;
      font-size: 5vw;
      animation: fall linear forwards;
    }

    @keyframes fall { to { transform: translateY(110vh); opacity: 0; } }

    .sparkle {
      width: 4vw;
      height: 4vw;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: sparkleAnim 2s linear infinite;
    }

    @keyframes sparkleAnim { 0% { transform: scale(0); opacity:0; } 50% { transform: scale(1); opacity:1; } 100% { transform: scale(0); opacity:0; } }
  </style>
</head>

<body>
  <div class="container">
    <h1>Will you go on a movie with me on 14th Feb?</h1>
    <div id="countdown"></div>
    <button class="btn yes" onclick="sayYes()">Yes</button>
    <button class="btn no" id="noBtn">No</button>
  </div>

  <audio autoplay loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_3b0b3c1c6e.mp3" type="audio/mpeg">
  </audio>

  <script>
    const noBtn = document.getElementById("noBtn");
    function moveNoButton() {
      const maxX = window.innerWidth - noBtn.offsetWidth;
      const maxY = window.innerHeight - noBtn.offsetHeight;
      noBtn.style.left = Math.random() * maxX + "px";
      noBtn.style.top = Math.random() * maxY + "px";
      noBtn.style.position = "absolute";
    }
    noBtn.addEventListener("mouseover", moveNoButton);
    noBtn.addEventListener("click", e => { e.preventDefault(); moveNoButton(); });
    document.addEventListener("keydown", moveNoButton);

    function sayYes() {
      document.body.innerHTML = `<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-size:8vw;text-shadow:0 0 15px white;flex-direction:column;font-family:'Minecraft',sans-serif;">💖 Yayyy! See you on 14th Feb 💖</div>`;
    }

    const countdownEl = document.getElementById("countdown");
    const targetDate = new Date("Feb 14, 2026 00:00:00").getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const d = targetDate - now;
      if(d < 0){ countdownEl.innerText = "It's today ❤️"; return; }
      const days = Math.floor(d / (1000*60*60*24));
      const hours = Math.floor((d % (1000*60*60*24)) / (1000*60*60));
      const minutes = Math.floor((d % (1000*60*60)) / (1000*60));
      const seconds = Math.floor((d % (1000*60)) / 1000);
      countdownEl.innerText = `${days}d ${hours}h ${minutes}m ${seconds}s left`;
    },1000);

    function createHeart(){
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "💗";
      heart.style.left = Math.random()*window.innerWidth + "px";
      heart.style.animationDuration = 3 + Math.random()*3 + "s";
      document.body.appendChild(heart);
      setTimeout(()=>heart.remove(),6000);
    }
    setInterval(createHeart,400);

    function createSparkle(){
      const s = document.createElement("div");
      s.className = "sparkle";
      s.style.left = Math.random()*window.innerWidth + "px";
      s.style.top = Math.random()*window.innerHeight + "px";
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),2000);
    }
    setInterval(createSparkle,200);
  </script>
</body>
</html>
